block_color.type = "text"
block_color.options.label = "Large Block Color"
block_color.options.description = "Enter the large block hexadecimal color code (default: #393939). Used as background color for the header menu, darker homepage blocks, image gallery block, certain footer configurations, etc. This color should have sufficient contrast with white text."
