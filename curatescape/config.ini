tertiary_link_color.options.label = "Light Color"
tertiary_link_color.options.description = "Enter the tertiary hexadecimal color code (default: #51E1FF). Used for text and links that appear on a darker background, etc. This color should have sufficient contrast against black."
tertiary_link_color.options.value = ""

