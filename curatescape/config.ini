; License Version
cc_version.type = "select"
cc_version.options.label = "Creative Commons Version"
cc_version.options.description = "If you prefer to license your content under a Creative Commons license version other than the most recent (currently 4.0), choose a different version below. See <a href="http://wiki.creativecommons.org/License_versions" target="_blank">Creative Commons License Versions</a> for details."
