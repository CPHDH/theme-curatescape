footer_style.type = "select"
footer_style.options.label = "Footer Style"
footer_style.options.description = "Select a style for the footer. Use this option to improve the legibility of footer navigation links and other content, especially when using a custom background image. The open styles leave the footer background transparent. The color gradient option adds a background gradient that matches the large  block color setting and may be useful for improving contrast when deploying a monochromatic background image. The contained and full width styles use the large block color as the background for the footer."
footer_style.options.multiOptions.fullwidth = "Full Width (default)"
footer_style.options.multiOptions.contained = "Contained"
footer_style.options.multiOptions.opendefault = "Open / Dark Text"
footer_style.options.multiOptions.openlight = "Open / Light Text"
footer_style.options.value = "fullwidth"

