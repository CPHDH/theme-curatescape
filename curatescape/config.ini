cc_jurisdiction.options.multiOptions.au = "Australia"
cc_jurisdiction.options.multiOptions.ca = "Canada"
cc_jurisdiction.options.multiOptions.uk = "United Kingdom (England and Whales)"
cc_jurisdiction.options.multiOptions.us = "United States"
