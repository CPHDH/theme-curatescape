[groups]
stealth.options.legend = "Site Visibility"
stealth.options.description='<span style="border-bottom: 1px solid #eee; display:block;margin-bottom:16px;padding-bottom: 0.5lh;" aria-hidden="true">Enable Stealth Mode while in development. Stealth Mode replaces your default homepage with a static informational page. Authenticated users will automatically see the full site. Published pages other than the homepage remain accessible by direct link.</span>'
stealth.elements[]="stealth_mode"

brand.options.legend = "Design & Site Identity"
brand.options.description='<span style="border-bottom: 1px solid #eee; display:block;margin-bottom:16px;padding-bottom: 0.5lh;" aria-hidden="true">Configure the logo, colors, and other brand elements for your site. When customizing colors, be sure to check all areas of your site to ensure that text and background colors have sufficient contrast to meet accessibility goals and guidelines.</span>'
