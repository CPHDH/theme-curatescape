google_analytics.options.label = "Google Analytics"
google_analytics.options.description = "Enter a Google Analytics Web Stream Measurement ID (example: <em>G-</em>1234567890) to enable site analytics at <a href="http://www.google.com/analytics" target="_blank">www.google.com/analytics</a>"
