cc_version.options.value = "4"

; License Country
cc_jurisdiction.type = "select"
cc_jurisdiction.options.label = "Creative Commons Jurisdiction"
cc_jurisdiction.options.description = "If you prefer to limit your Creative Commons license to a national jurisdiction, choose a different version below. "International" is the recommended default. <strong>WARNING</strong>: Not all national jurisdictions are compatible with all license versions. Choosing an incompatible combination will result in a broken link and an invalid license. For details, see <a href="http://wiki.creativecommons.org/Frequently_Asked_Questions#Should_I_choose_an_international_license_or_a_ported_license.3F" target="_blank">Should I choose an international license or a ported license?</a>."
