comments_id.options.label = "Disqus Comments"
comments_id.options.description = "To enable comments on items, enter the shortname (example: myProjectName) from your Disqus site settings. Note that comment administration and moderation will be handled at <a href="http://disqus.com" target="_blank">disqus.com</a>."
